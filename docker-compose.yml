services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nati_nest
      POSTGRES_USER: nati_nest
      POSTGRES_PASSWORD: nati_nest_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nati_nest -d nati_nest"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    restart: unless-stopped
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env.production.example
    environment:
      DATABASE_URL: postgresql://nati_nest:nati_nest_password@postgres:5432/nati_nest?schema=public
      CLIENT_URL: http://localhost:3000
      PORT: 5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./frontend/.env.production.example
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:

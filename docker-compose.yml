services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET:?SESSION_JWT_SECRET is required}
      SESSION_JWT_EXPIRES_IN: ${SESSION_JWT_EXPIRES_IN:-12h}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      BACKEND_URL: ${BACKEND_URL:-http://localhost}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Kolkata}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_SLOW_REQUEST_MS: ${LOG_SLOW_REQUEST_MS:-1000}
      LOG_SLOW_QUERY_MS: ${LOG_SLOW_QUERY_MS:-500}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-40}
      API_RATE_LIMIT_WINDOW_MS: ${API_RATE_LIMIT_WINDOW_MS:-60000}
      API_RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX:-200}
      SOCKET_RATE_LIMIT_WINDOW_MS: ${SOCKET_RATE_LIMIT_WINDOW_MS:-60000}
      SOCKET_RATE_LIMIT_MAX: ${SOCKET_RATE_LIMIT_MAX:-30}
      SENTRY_DSN: ${SENTRY_DSN:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    expose:
      - "5000"
    volumes:
      - backend_uploads:/app/uploads
      - app_backups:/app/backups
      - app_logs:/app/logs
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    networks:
      - nati_nest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Nati Nest}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    networks:
      - nati_nest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      # - "443:443" # Enable after adding SSL certificates or an HTTPS termination layer.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    networks:
      - nati_nest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ready >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  nati_nest:
    driver: bridge

volumes:
  backend_uploads:
  app_backups:
  app_logs:
